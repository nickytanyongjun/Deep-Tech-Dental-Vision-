<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentalVision AI | 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">

    <div class="container-fluid">
        <div class="row min-vh-100">
            <nav class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse">
                <div class="position-sticky pt-3 text-white px-3">
                    <h3 class="h5">🦷 DentalVision</h3>
                    <hr>
                    <p class="small text-secondary">AI-Powered Age Estimation for Clinical Research.</p>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-5">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">X-Ray Analysis Dashboard</h1>
                </div>

                <div class="row">
                    <div class="col-lg-6">
                        <div class="card shadow-sm mb-4">
                            <div class="card-body">
                                <h5 class="card-title">Upload X-Ray</h5>
                                <input type="file" id="imageInput" class="form-control my-3" accept="image/*">
                                <button id="analyzeBtn" class="btn btn-primary w-100">Analyze Image</button>
                            </div>
                        </div>
                        <div class="card shadow-sm">
                            <div id="imagePreviewContainer" class="card-body text-center d-none">
                                <img id="imagePreview" src="#" alt="Preview" class="img-fluid rounded">
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="card shadow-sm min-vh-50">
                            <div class="card-header bg-white">Analysis Results</div>
                            <div class="card-body" id="resultArea">
                                <p class="text-muted">Results will appear here after analysis...</p>
                            </div>
                            <div id="loader" class="text-center d-none mb-3">
                                <div class="spinner-border text-primary" role="status"></div>
                                <p>Analyzing ...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
